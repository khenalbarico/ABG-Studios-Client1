# Deploys the Blazor WASM UI to Azure Static Web Apps.
#   main -> DEV SWA, prod -> PROD SWA (CLAUDE.md §4)
#
# The UI references Abg.Domain from the ABG-Studios-API1 repo by relative
# path, so both repos are checked out side by side, mirroring the local
# folder layout. CROSS_REPO_TOKEN must be a PAT (or GitHub App token) with
# read access to ABG-Studios-API1.
name: Deploy Static Web App

on:
  push:
    branches: [main, prod]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout UI repo
        uses: actions/checkout@v4
        with:
          path: ABG-Studios-UI1

      - name: Checkout API repo (shared Abg.Domain)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ABG-Studios-API1
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: ${{ github.ref_name }}
          path: ABG-Studios-API1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish WASM app
        run: dotnet publish ABG-Studios-UI1/BlazorApp1/BlazorApp1.csproj -c Release -o publish

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ github.ref_name == 'prod' && secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV }}
          action: upload
          app_location: publish/wwwroot
          skip_app_build: true
          skip_api_build: true
